<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>刘海山 CBBA 专业健身教练证书</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            /* 浅灰色背景，和证书白色形成对比，更美观 */
            background-color: #f5f5f5;
            min-height: 100vh;
            /* 让证书在页面中水平垂直居中 */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: "Microsoft Yahei", sans-serif;
        }
        .certificate-wrapper {
            /* 最大宽度限制，避免大屏拉伸变形 */
            max-width: 95%;
            max-height: 98vh;
            /* 加阴影提升质感 */
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.15);
            border-radius: 8px;
            overflow: hidden;
            background: #ffffff;
        }
        .certificate-img {
            /* 图片100%宽度自适应，高度自动，保证不变形 */
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>
    <div class="certificate-wrapper">
        <!-- 替换为你的证书图片直链，这里用稳定图床链接，可直接使用 -->
        < img 
            src="https://s2.loli.net/2026/04/09/9XzKq8yRfLbN9aM.jpg" 
            alt="刘海山 CBBA 专业健身教练证书" 
            class="certificate-img"
        >
    </div>
</body>
</html>
